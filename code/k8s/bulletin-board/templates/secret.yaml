{{- if and .Values.secret.create (not .Values.secret.existingSecretName) }}
{{- /* Пустые строки не попадают в Secret: иначе secretRef перезапишет ключи из ConfigMap пустыми значениями и приложение не поднимется. */ -}}
{{- $sd := dict }}
{{- range $k, $v := .Values.secret.stringData }}
  {{- if $v }}
    {{- $_ := set $sd $k $v }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.names.secret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
type: Opaque
{{- if $sd }}
stringData:
  {{- toYaml $sd | nindent 2 }}
{{- else }}
stringData: {}
{{- end }}
{{- end }}
