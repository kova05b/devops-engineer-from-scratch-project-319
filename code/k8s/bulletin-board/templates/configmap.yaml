apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.names.configMap }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: {{ .Values.config.SPRING_PROFILES_ACTIVE | quote }}
  MANAGEMENT_SERVER_PORT: {{ .Values.config.MANAGEMENT_SERVER_PORT | quote }}
  STORAGE_S3_BUCKET: {{ .Values.config.STORAGE_S3_BUCKET | quote }}
  STORAGE_S3_REGION: {{ .Values.config.STORAGE_S3_REGION | quote }}
  STORAGE_S3_ENDPOINT: {{ .Values.config.STORAGE_S3_ENDPOINT | quote }}
  SPRING_DATASOURCE_URL: {{ .Values.config.SPRING_DATASOURCE_URL | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.config.SPRING_DATASOURCE_USERNAME | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.config.SPRING_DATASOURCE_PASSWORD | quote }}
