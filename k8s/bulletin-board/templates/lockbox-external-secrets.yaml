{{- if .Values.lockbox.enabled }}
{{- $_ := required "lockbox.secretId is required when lockbox.enabled (e.g. terraform output -raw lockbox_secret_id)" .Values.lockbox.secretId -}}
---
apiVersion: {{ .Values.lockbox.externalSecretsApiVersion }}
kind: SecretStore
metadata:
  name: {{ .Values.lockbox.storeName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
spec:
  provider:
    yandexlockbox:
      auth:
        authorizedKeySecretRef:
          name: {{ .Values.lockbox.authSecretName }}
          key: {{ .Values.lockbox.authSecretKey }}
---
apiVersion: {{ .Values.lockbox.externalSecretsApiVersion }}
kind: ExternalSecret
metadata:
  name: {{ .Values.lockbox.externalSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.lockbox.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.lockbox.storeName }}
    kind: SecretStore
  target:
    name: {{ .Values.lockbox.targetSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: SPRING_DATASOURCE_URL
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: SPRING_DATASOURCE_USERNAME
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: SPRING_DATASOURCE_PASSWORD
    - secretKey: STORAGE_S3_BUCKET
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: STORAGE_S3_BUCKET
    - secretKey: STORAGE_S3_REGION
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: STORAGE_S3_REGION
    - secretKey: STORAGE_S3_ENDPOINT
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: STORAGE_S3_ENDPOINT
    - secretKey: STORAGE_S3_ACCESSKEY
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: STORAGE_S3_ACCESSKEY
    - secretKey: STORAGE_S3_SECRETKEY
      remoteRef:
        key: {{ .Values.lockbox.secretId | quote }}
        property: STORAGE_S3_SECRETKEY
{{- end }}
